<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DR Congo Page</title>

    <meta name="description"
        content="Explore the Democratic Republic of the Congo including culture, geography, weather, and beautiful landscapes.">

    <meta name="author" content="Mukadi Tshibangu">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Democratic Republic of the Congo</h1>
    </header>

    <main>

        <picture>
            <source srcset="images/congo-large.webp" media="(min-width: 768px)">
            <img src="images/congo-small.webp" alt="DR Congo Landscape">
        </picture>

        <section class="data">
            <h2>Data</h2>

            <p><strong>Area:</strong> 2,344,858 sq km</p>
            <p><strong>Population:</strong> 111 million</p>
            <p><strong>Capital:</strong> Kinshasa</p>
            <p><strong>Languages:</strong> French, Lingala, Swahili</p>
            <p><strong>Currency:</strong> Congolese Franc</p>
            <p><strong>Time Zone:</strong> UTC+1 to UTC+2</p>
        </section>

        <section class="weather">
            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather Icon">

            <p><strong>Temperature:</strong> <span id="temp">8</span> °C</p>
            <p><strong>Wind Speed:</strong> <span id="speed">10</span> km/h</p>
            <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
        </section>

    </main>

    <footer>
        <p>
            © <span id="currentyear"></span> 🌍 Mukadi Tshibangu 🌍 DR Congo
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
