<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>

    <meta name="description" content="Submit a product review including ratings, installation date, useful features, and customer feedback.">

    <meta name="author" content="Mukadi Tshibangu">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>

<header>
    <h1>Product Review Form</h1>
</header>

<main>
    <form method="get" action="review.html">

        <label for="productName">Product Name *</label>
        <select id="productName" name="productName" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <fieldset>
            <legend>Overall Rating *</legend>

            <input type="radio" id="star1" name="rating" value="1" required>
            <label for="star1">☆</label>

            <input type="radio" id="star2" name="rating" value="2" required>
            <label for="star2">☆☆</label>

            <input type="radio" id="star3" name="rating" value="3" required>
            <label for="star3">☆☆☆</label>

            <input type="radio" id="star4" name="rating" value="4" required>
            <label for="star4">☆☆☆☆</label>

            <input type="radio" id="star5" name="rating" value="5" required>
            <label for="star5">☆☆☆☆☆</label>
        </fieldset>

        <label for="installDate">Date of Installation *</label>
        <input type="date" id="installDate" name="installDate" required>

        <fieldset>
            <legend>Useful Features (Check all that apply)</legend>

            <input type="checkbox" id="durability" name="features" value="Durability">
            <label for="durability">Durability</label>

            <input type="checkbox" id="ease" name="features" value="Ease of Use">
            <label for="ease">Ease of Use</label>

            <input type="checkbox" id="performance" name="features" value="Performance">
            <label for="performance">Performance</label>

            <input type="checkbox" id="design" name="features" value="Design">
            <label for="design">Design</label>
        </fieldset>

        <label for="review">Written Review</label>
        <textarea id="review" name="review" rows="5"></textarea>

        <label for="username">User Name</label>
        <input type="text" id="username" name="username">

        <input type="submit" value="Submit Review">

    </form>
</main>

<footer>
    <p>&copy; <span id="year"></span> | Mukadi Tshibangu | DR Congo</p>
    <p>Last Modified: <span id="lastModified"></span></p>
</footer>

</body>
</html>
