<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Temple Album</title>

    <meta name="description" content="A responsive temple album page featuring beautiful temples, a mobile navigation menu, and a responsive image gallery.">
    
    <meta name="author" content="Mukadi Tshibangu">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

<body>

    <header>
        <h1>Temple Album</h1>

        <button id="menu-button">☰</button>

        <nav class="navigation">
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>

    <main>
        <h2>Temple Gallery</h2>

        <div class="gallery">

            <figure>
                <img src="images/temple1.jpg" alt="Temple 1" loading="lazy">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple2.jpg" alt="Temple 2" loading="lazy">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple3.jpg" alt="Temple 3" loading="lazy">
                <figcaption>Paris France Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple4.jpg" alt="Temple 4" loading="lazy">
                <figcaption>Kinshasa Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple5.jpg" alt="Temple 5" loading="lazy">
                <figcaption>Accra Ghana Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple6.jpg" alt="Temple 6" loading="lazy">
                <figcaption>Tokyo Japan Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple7.jpg" alt="Temple 7" loading="lazy">
                <figcaption>Manila Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple8.jpg" alt="Temple 8" loading="lazy">
                <figcaption>Nairobi Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple9.jpg" alt="Temple 9" loading="lazy">
                <figcaption>Mexico City Temple</figcaption>
            </figure>

        </div>
    </main>

    <footer>
        <p>
            © <span id="currentyear"></span> | Mukadi Tshibangu | DR Congo
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
